# Reviewed free-space poses on the upstream TurtleBot3 world map shipped by
# turtlebot3_navigation2. The robot spawns at home (-2.0, -0.5).
targets:
  dock:
    frame_id: map
    x: 0.0
    y: -2.0
    yaw: 1.57
  workbench:
    frame_id: map
    x: 0.0
    y: 2.0
    yaw: -1.57
  home:
    frame_id: map
    x: -2.0
    y: -0.5
    yaw: 0.0

keepout_zones:
  - name: restricted_area
    enforced: false
    polygon:
      - [-2.3, 0.2]
      - [-1.7, 0.2]
      - [-1.7, 0.8]
      - [-2.3, 0.8]
