<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700" role="img" aria-labelledby="title description">
  <title id="title">Embodied Agent Runtime trust-boundary architecture</title>
  <desc id="description">Untrusted user and model input cross a strict gateway before deterministic Guard, executor, Nav2, and robot layers.</desc>
  <defs>
    <linearGradient id="architectureBackground" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="1" stop-color="#0b1e31"/>
    </linearGradient>
    <marker id="architectureArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#48ddea"/>
    </marker>
    <filter id="architectureShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#020711" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1600" height="700" rx="24" fill="url(#architectureBackground)"/>
  <text x="80" y="76" fill="#f4fbff" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="800">TRUST-BOUNDARY ARCHITECTURE</text>
  <text x="80" y="112" fill="#8fb3c4" font-family="Inter, Segoe UI, sans-serif" font-size="19">The model selects a named task. Deterministic code owns every motion decision.</text>

  <rect x="68" y="152" width="492" height="66" rx="16" fill="#3d2130" stroke="#ff7291" stroke-opacity="0.65"/>
  <text x="314" y="192" text-anchor="middle" fill="#ffc2d0" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700">UNTRUSTED INTENT LAYER</text>
  <rect x="592" y="152" width="940" height="66" rx="16" fill="#173b39" stroke="#5be1a0" stroke-opacity="0.65"/>
  <text x="1062" y="192" text-anchor="middle" fill="#b0f5ce" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700">DETERMINISTIC RUNTIME AUTHORITY</text>
  <path d="M 576 140 V 572" stroke="#ffcb6b" stroke-width="3" stroke-dasharray="10 10"/>
  <text x="576" y="610" text-anchor="middle" fill="#ffdf9f" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700">TRUST BOUNDARY</text>

  <g font-family="Inter, Segoe UI, sans-serif" filter="url(#architectureShadow)">
    <g transform="translate(80 276)">
      <rect width="180" height="160" rx="22" fill="#122a42" stroke="#5f9fd0" stroke-width="2"/>
      <circle cx="90" cy="49" r="27" fill="#1c4c69" stroke="#7eddf1" stroke-width="2"/>
      <path d="M 75 47 Q 90 29 105 47 M 67 61 Q 90 77 113 61" fill="none" stroke="#c7f8ff" stroke-width="3" stroke-linecap="round"/>
      <text x="90" y="104" text-anchor="middle" fill="#f2f8fb" font-size="21" font-weight="700">USER INTENT</text>
      <text x="90" y="133" text-anchor="middle" fill="#8fb3c4" font-size="15">Chinese / English</text>
    </g>
    <g transform="translate(300 276)">
      <rect width="220" height="160" rx="22" fill="#182a43" stroke="#8b88ff" stroke-width="2"/>
      <circle cx="110" cy="49" r="27" fill="#38356f" stroke="#aaa7ff" stroke-width="2"/>
      <path d="M 96 49 H 124 M 110 35 V 63 M 91 40 L 129 58 M 129 40 L 91 58" stroke="#ddd9ff" stroke-width="2"/>
      <text x="110" y="104" text-anchor="middle" fill="#f2f8fb" font-size="21" font-weight="700">MODEL PROVIDER</text>
      <text x="110" y="133" text-anchor="middle" fill="#9eacd0" font-size="15">Named target only</text>
    </g>
    <g transform="translate(620 276)">
      <rect width="210" height="160" rx="22" fill="#103348" stroke="#35d8e8" stroke-width="2"/>
      <rect x="75" y="25" width="60" height="50" rx="8" fill="#18576a" stroke="#73eff8" stroke-width="2"/>
      <path d="M 88 43 H 122 M 88 56 H 116" stroke="#c2fbff" stroke-width="3" stroke-linecap="round"/>
      <text x="105" y="104" text-anchor="middle" fill="#f2f8fb" font-size="21" font-weight="700">STRICT GATEWAY</text>
      <text x="105" y="132" text-anchor="middle" fill="#92c8d3" font-size="14">JSON · Schema · duplicates</text>
    </g>
    <g transform="translate(870 276)">
      <rect width="200" height="160" rx="22" fill="#163a38" stroke="#58dda0" stroke-width="2"/>
      <path d="M 100 23 L 132 36 V 58 Q 128 76 100 84 Q 72 76 68 58 V 36 Z" fill="#1d5a4c" stroke="#8bf0bf" stroke-width="2"/>
      <path d="M 84 55 L 95 66 L 117 43" fill="none" stroke="#d2ffe6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="100" y="109" text-anchor="middle" fill="#f2f8fb" font-size="21" font-weight="700">C++ TASK GUARD</text>
      <text x="100" y="136" text-anchor="middle" fill="#9bd0bb" font-size="14">Policy + robot context</text>
    </g>
    <g transform="translate(1110 276)">
      <rect width="200" height="160" rx="22" fill="#173348" stroke="#62b7ef" stroke-width="2"/>
      <circle cx="100" cy="50" r="31" fill="none" stroke="#8cd2ff" stroke-width="3"/>
      <path d="M 100 50 L 100 31 M 100 50 L 117 61" stroke="#d7efff" stroke-width="4" stroke-linecap="round"/>
      <text x="100" y="109" text-anchor="middle" fill="#f2f8fb" font-size="21" font-weight="700">EXECUTOR</text>
      <text x="100" y="136" text-anchor="middle" fill="#98bed5" font-size="14">Deadline · cancel · retry</text>
    </g>
    <g transform="translate(1350 276)">
      <rect width="170" height="160" rx="22" fill="#253446" stroke="#ffcb6b" stroke-width="2"/>
      <path d="M 55 67 Q 85 18 115 67" fill="none" stroke="#ffe2a3" stroke-width="4"/>
      <circle cx="55" cy="67" r="9" fill="#ffcb6b"/>
      <circle cx="115" cy="67" r="9" fill="#ffcb6b"/>
      <text x="85" y="109" text-anchor="middle" fill="#f2f8fb" font-size="21" font-weight="700">NAV2</text>
      <text x="85" y="136" text-anchor="middle" fill="#c7b690" font-size="14">Plan + control</text>
    </g>
  </g>

  <g fill="none" stroke="#48ddea" stroke-width="4" marker-end="url(#architectureArrow)">
    <path d="M 260 356 H 292"/>
    <path d="M 520 356 H 612"/>
    <path d="M 830 356 H 862"/>
    <path d="M 1070 356 H 1102"/>
    <path d="M 1310 356 H 1342"/>
  </g>

  <g font-family="Inter, Segoe UI, sans-serif">
    <rect x="80" y="492" width="440" height="92" rx="18" fill="#101f32" stroke="#314c61"/>
    <text x="104" y="528" fill="#ffb5c6" font-size="17" font-weight="700">MODEL CANNOT PROVIDE</text>
    <text x="104" y="558" fill="#9db7c5" font-size="16">coordinates · velocity · trajectories · retries · recovery XML</text>
    <rect x="620" y="492" width="690" height="92" rx="18" fill="#102a2b" stroke="#376354"/>
    <text x="644" y="528" fill="#aef5cc" font-size="17" font-weight="700">RUNTIME OWNS</text>
    <text x="644" y="558" fill="#9fc3b6" font-size="16">named poses · readiness · global deadline · cancellation · bounded recovery</text>
    <rect x="1350" y="492" width="170" height="92" rx="18" fill="#292a2e" stroke="#6d6040"/>
    <text x="1435" y="528" text-anchor="middle" fill="#ffe2a3" font-size="17" font-weight="700">OUTPUT</text>
    <text x="1435" y="558" text-anchor="middle" fill="#c8b991" font-size="15">feedback + result</text>
  </g>

  <text x="80" y="654" fill="#628295" font-family="Inter, Segoe UI, sans-serif" font-size="15">Fake NavigateToPose verifies lifecycle today · Real Nav2/TurtleBot3 remains a system-integration milestone</text>
</svg>
