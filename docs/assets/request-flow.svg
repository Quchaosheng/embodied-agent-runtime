<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title description">
  <title id="title">Fail-closed request flow</title>
  <desc id="description">A natural-language request passes provider, Schema, and Guard decisions before any Nav2 goal can exist.</desc>
  <defs>
    <linearGradient id="flowBackground" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="1" stop-color="#0c2033"/>
    </linearGradient>
    <marker id="flowArrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#44dfec"/>
    </marker>
    <marker id="flowArrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6f91"/>
    </marker>
    <marker id="flowArrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#62e6a1"/>
    </marker>
  </defs>

  <rect width="1600" height="920" rx="24" fill="url(#flowBackground)"/>
  <text x="72" y="68" fill="#f3fbff" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="800">FAIL-CLOSED REQUEST FLOW</text>
  <text x="72" y="104" fill="#8fb3c4" font-family="Inter, Segoe UI, sans-serif" font-size="19">Every rejection exits before the next side-effect boundary.</text>

  <g font-family="Inter, Segoe UI, sans-serif">
    <g transform="translate(590 142)">
      <rect width="420" height="74" rx="20" fill="#172c45" stroke="#789be8" stroke-width="2"/>
      <text x="210" y="32" text-anchor="middle" fill="#f2f8fb" font-size="21" font-weight="700">NATURAL-LANGUAGE REQUEST</text>
      <text x="210" y="56" text-anchor="middle" fill="#a3b6d3" font-size="15">“电量低了，请返回充电桩”</text>
    </g>
    <g transform="translate(590 252)">
      <rect width="420" height="74" rx="20" fill="#172f48" stroke="#42cfe1" stroke-width="2"/>
      <text x="210" y="32" text-anchor="middle" fill="#f2f8fb" font-size="21" font-weight="700">PROVIDER TOOL ARGUMENTS</text>
      <text x="210" y="56" text-anchor="middle" fill="#91c3d0" font-size="15">one approved named target or no task</text>
    </g>
    <g transform="translate(590 362)">
      <rect width="420" height="82" rx="20" fill="#103449" stroke="#47dce9" stroke-width="2"/>
      <text x="210" y="34" text-anchor="middle" fill="#f2f8fb" font-size="21" font-weight="700">STRICT JSON GATEWAY</text>
      <text x="210" y="60" text-anchor="middle" fill="#96cad4" font-size="15">duplicate keys · Draft 7 · closed fields</text>
    </g>

    <g transform="translate(800 520)">
      <path d="M 0 -70 L 150 0 L 0 70 L -150 0 Z" fill="#153c43" stroke="#5fe4c2" stroke-width="3"/>
      <text x="0" y="-6" text-anchor="middle" fill="#eafff7" font-size="20" font-weight="700">SCHEMA VALID?</text>
      <text x="0" y="20" text-anchor="middle" fill="#9fd3c1" font-size="14">contract fields only</text>
    </g>
    <g transform="translate(800 690)">
      <path d="M 0 -70 L 150 0 L 0 70 L -150 0 Z" fill="#153c43" stroke="#5fe4c2" stroke-width="3"/>
      <text x="0" y="-6" text-anchor="middle" fill="#eafff7" font-size="20" font-weight="700">GUARD ACCEPTS?</text>
      <text x="0" y="20" text-anchor="middle" fill="#9fd3c1" font-size="14">policy + readiness + idle</text>
    </g>

    <g transform="translate(1110 476)">
      <rect width="390" height="96" rx="20" fill="#421f2d" stroke="#ff7192" stroke-width="2"/>
      <text x="195" y="35" text-anchor="middle" fill="#ffd1dc" font-size="21" font-weight="700">GATEWAY REJECTS</text>
      <text x="195" y="63" text-anchor="middle" fill="#d6a3b0" font-size="15">error 10 / 11 · no ROS Action</text>
      <text x="195" y="82" text-anchor="middle" fill="#ff96ae" font-size="13" font-weight="700">NO MOTION SIDE EFFECT</text>
    </g>
    <g transform="translate(1100 646)">
      <rect width="400" height="96" rx="20" fill="#421f2d" stroke="#ff7192" stroke-width="2"/>
      <text x="200" y="35" text-anchor="middle" fill="#ffd1dc" font-size="21" font-weight="700">RUNTIME REJECTS</text>
      <text x="200" y="63" text-anchor="middle" fill="#d6a3b0" font-size="15">explicit error · attempts = 0</text>
      <text x="200" y="82" text-anchor="middle" fill="#ff96ae" font-size="13" font-weight="700">NO NAV2 GOAL EXISTS</text>
    </g>

    <g transform="translate(100 646)">
      <rect width="420" height="96" rx="20" fill="#15383b" stroke="#5de2a1" stroke-width="2"/>
      <text x="210" y="35" text-anchor="middle" fill="#d8ffea" font-size="21" font-weight="700">NAMED TARGET → REVIEWED POSE</text>
      <text x="210" y="63" text-anchor="middle" fill="#9fcbb7" font-size="15">version-controlled YAML · map frame</text>
      <text x="210" y="82" text-anchor="middle" fill="#7cf0b1" font-size="13" font-weight="700">ONLY AFTER GUARD ACCEPTANCE</text>
    </g>
    <g transform="translate(100 790)">
      <rect width="420" height="82" rx="20" fill="#233848" stroke="#ffcb6b" stroke-width="2"/>
      <text x="210" y="34" text-anchor="middle" fill="#fff0c8" font-size="21" font-weight="700">NAVIGATE TO POSE</text>
      <text x="210" y="60" text-anchor="middle" fill="#c9b992" font-size="15">feedback · cancel · terminal result</text>
    </g>
    <g transform="translate(590 790)">
      <rect width="420" height="82" rx="20" fill="#16394a" stroke="#56cfee" stroke-width="2"/>
      <text x="210" y="34" text-anchor="middle" fill="#e7f9ff" font-size="21" font-weight="700">STABLE TASK OUTCOME</text>
      <text x="210" y="60" text-anchor="middle" fill="#9dc6d5" font-size="15">state · error code · attempts · detail</text>
    </g>
  </g>

  <g fill="none" stroke="#44dfec" stroke-width="4" marker-end="url(#flowArrowCyan)">
    <path d="M 800 216 V 244"/>
    <path d="M 800 326 V 354"/>
    <path d="M 800 444 V 462"/>
    <path d="M 800 590 V 612"/>
  </g>
  <path d="M 950 520 H 1098" fill="none" stroke="#ff6f91" stroke-width="4" marker-end="url(#flowArrowRed)"/>
  <text x="1023" y="504" text-anchor="middle" fill="#ff9db2" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700">NO</text>
  <path d="M 950 690 H 1088" fill="none" stroke="#ff6f91" stroke-width="4" marker-end="url(#flowArrowRed)"/>
  <text x="1018" y="674" text-anchor="middle" fill="#ff9db2" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700">NO</text>
  <path d="M 650 690 H 532" fill="none" stroke="#62e6a1" stroke-width="4" marker-end="url(#flowArrowGreen)"/>
  <text x="590" y="674" text-anchor="middle" fill="#97f5c0" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700">YES</text>
  <path d="M 310 742 V 782" fill="none" stroke="#62e6a1" stroke-width="4" marker-end="url(#flowArrowGreen)"/>
  <path d="M 520 831 H 582" fill="none" stroke="#44dfec" stroke-width="4" marker-end="url(#flowArrowCyan)"/>

  <text x="650" y="504" text-anchor="end" fill="#97f5c0" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700">YES → EXECUTE TASK</text>
</svg>
